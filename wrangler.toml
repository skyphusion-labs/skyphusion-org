# skyphusion.org -- the intro site. A thin Worker that serves static assets (public/).
# No build step, no framework -- vanilla HTML/CSS/JS by design.
#
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env / CI secret), not hardcoded.

name = "skyphusion-org"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# The static site.
assets = { directory = "./public", binding = "ASSETS" }

[observability]
enabled = true

# --- Deploy / routing ---
# Serve the apex skyphusion.org from this worker via a Workers Custom Domain.
# custom_domain provisions the proxied DNS + cert for the bare apex (a plain route
# pattern would have no DNS to attach to). The apex MX/TXT (email routing) records
# are unaffected. (www is a separate follow-up: it currently points at a placeholder.)
[[routes]]
pattern = "skyphusion.org"
custom_domain = true

[[routes]]
pattern = "www.skyphusion.org"
custom_domain = true
